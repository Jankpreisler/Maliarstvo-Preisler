<body class="telo">

    <div class="header">
        <div class="headercontent">
            <div>
                <img class="logo" src="Preisler_Zadanie č.3 logo.png" alt="Logo">
            </div>

             <div class="bottom-navbar">
                <a href="index.html">O nás</a>
                <a href="sluzby.html">Služby</a>
                <a href="Kontaktujtenas.html">Kontaktujte nás</a>
                <a href="Cennik.html">Cenník</a>
            </div>

            <div class="burgerikmenu">   
                <input type="checkbox" id="menu-bar" class="menu-checkbox">
                <label for="menu-bar" class="hamburger">☰</label>
            </div>
        </div>
    </div>


    <div class="burger-pruhy">
        <a href="index.html" class="pruh zlta"><span>O nás</span></a>
        <a href="sluzby.html" class="pruh cervena"><span>Naše Služby</span></a>
        <a href="Kontaktujtenas.html" class="pruh oranzova"><span>Kontaktujte nás</span></a>
        <a href="Cennik.html" class="pruh modra"><span>Cenník</span></a>
    </div>

    <div class="kontakt-sekcia">
    <div class="form-karta">
        <h2>Napíšte nám</h2>
        <p>Máte otázky alebo chcete naceniť projekt? Sme tu pre vás.</p>

        <form action="#" method="POST">
            <div class="input-riadok">
                <input type="text" name="meno" placeholder="Vaše meno" required>
                <input type="email" name="email" placeholder="Váš E-mail" required>
            </div>
            
            <div class="input-riadok">
                <select name="sluzba" required>
                    <option value="" disabled selected>Vyberte službu</option>
                    <option value="interier">Maľovanie interiéru</option>
                    <option value="exterier">Maľovanie fasády</option>
                    <option value="stierkovanie">Stierkovanie</option>
                </select>
                <input type="text" name="m2" placeholder="Plocha v m2 (voliteľné)" required>
            </div>

            <textarea name="sprava" rows="5" placeholder="Povedzte nám viac o vašej predstave..." required ></textarea>
            
            <button type="submit" class="odoslat-btn">Odoslať dopyt</button>
        </form>
    </div>
</div>

    <footer>
        <p> &copy; 2026 Maliarstvo Preisler. Všetky práva vyhradené.</p>
    </footer>
